<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        #debugLogs {
            display: none;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
        #toggleDebug {
            margin-top: 10px;
        }
    </style>
    <script>
        var debugVisible = false;
        function toggleDebug() {
            debugVisible = !debugVisible;
            document.getElementById('debugLogs').style.display = debugVisible ? 'block' : 'none';
        }

        function updateDebugLogs(direction, headPos, foodPos, gameState, inputs) {
            const logContent = `Direction: ${direction}\nSnake Head Position: ${headPos}\nFood Position: ${foodPos}\nGame State: ${gameState}\nInputs: ${inputs}`;
            document.getElementById('debugLogs').innerText = logContent;
        }
    </script>
</head>
<body>
    <h1>Snake Game</h1>
    <button id="toggleDebug" onclick="toggleDebug()">Show/Hide Debug Logs</button>
    <div id="debugLogs"></div>
    <script>
        // Example of how to call updateDebugLogs
        // You can replace these values with actual game state variables
        updateDebugLogs('UP', {x: 5, y: 5}, {x: 10, y: 10}, 'RUNNING', 'Arrow Up');
    </script>
</body>
</html>
