<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Optimized Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid #000;
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 0, y: 0 };
        let gameInterval;
        let gameSpeed = 100;

        function startGame() {
            clearInterval(gameInterval);
            gameInterval = setInterval(moveSnake, gameSpeed);
        }

        function pauseGame() {
            clearInterval(gameInterval);
        }

        function moveSnake() {
            // Move the snake
            const newHead = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            snake.unshift(newHead);

            // Check for food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                placeFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            snake.forEach(part => ctx.fillRect(part.x * 10, part.y * 10, 10, 10));
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * 10, food.y * 10, 10, 10);
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * (canvas.width / 10));
            food.y = Math.floor(Math.random() * (canvas.height / 10));
        }

        function handleSwipe(direction) {
            if (direction === 'up' && direction.y === 0) {
                direction = { x: 0, y: -1 };
            } else if (direction === 'down' && direction.y === 0) {
                direction = { x: 0, y: 1 };
            } else if (direction === 'left' && direction.x === 0) {
                direction = { x: -1, y: 0 };
            } else if (direction === 'right' && direction.x === 0) {
                direction = { x: 1, y: 0 };
            }
        }

        function setDifficulty(e) {
            const selectedDifficulty = e.target.value;
            if (selectedDifficulty === 'easy') {
                gameSpeed = 150;
            } else if (selectedDifficulty === 'medium') {
                gameSpeed = 100;
            } else {
                gameSpeed = 50;
            }
            if (gameInterval) {
                startGame();
            }
        }

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', pauseGame);
        document.getElementById('difficulty').addEventListener('change', setDifficulty);

        // Touch control listeners
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const touchX = touch.clientX - canvas.offsetLeft;
            const touchY = touch.clientY - canvas.offsetTop;
            if (touchY < canvas.height / 2) {
                handleSwipe('up');
            } else {
                handleSwipe('down');
            }
        });

        // Add other touch events for left and right swipes
        // [...]

        placeFood();
    </script>
</body>
</html>
